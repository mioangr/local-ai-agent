# Shared installation configuration
# This file is sourced by setup shell scripts and can also be read by Python tools.
# Choose one Ollama model by leaving a single MODEL_NAME line uncommented.
# Smaller models are better while validating the installer end-to-end.
# Larger models are listed below as commented options for later use.

AI_USER="aiuser"
INSTALL_DEST_DIR="local-ai-agent"

# Small default for testing and lower-memory VMs.
MODEL_NAME="qwen2.5-coder:1.5b"

# Medium options.
# MODEL_NAME="qwen2.5-coder:3b"
# MODEL_NAME="deepseek-coder:1.3b"

# Larger options. These need more RAM/CPU and take longer to download.
# MODEL_NAME="deepseek-coder:6.7b-instruct-q4_K_M"
# MODEL_NAME="qwen2.5-coder:7b"
# MODEL_NAME="codellama:7b"

LOG_LEVEL="INFO"
